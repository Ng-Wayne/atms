<div class="min-h-screen bg-gray-100 flex flex-col items-center justify-center">

  <h1 class="text-5xl font-bold mb-12">
    Enter Withdrawal Amount
  </h1>

  <div class="max-w-xl rounded-2xl border border-slate-700 bg-slate-800 p-8 shadow-lg">
    <div class="space-y-6">

      <input
        type="number"
        id="amount"
        name="amount"
        min="50"
        step="0.01"
        placeholder="Enter amount"
        class="w-full rounded-xl border border-slate-600 bg-slate-900 px-5 py-4 text-xl text-white placeholder-slate-500 focus:border-slate-200 focus:outline-none focus:ring-2 focus:ring-slate-200/20"
      />

      <button
        type="submit"
        class="w-full rounded-xl bg-blue-700 py-4 text-lg font-normal text-white transition hover:bg-blue-900"
      >
        Withdraw Funds
      </button>
    </div>
  </div>

</div>
