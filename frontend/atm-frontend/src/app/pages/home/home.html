<div class="min-h-screen bg-gray-100 flex flex-col items-center justify-center gap-8">

  <h1 class="text-5xl font-bold mb-12">
    Please Select A Transaction
  </h1>

  <div class="flex gap-8">

    <button
      (click)="balanceInquiry()"
      class="
          bg-black text-white
          px-8 py-3
          rounded-lg
          text-lg
          hover:bg-gray-400
          transition-all duration-200
        "
    >
      Balance Inquiry
    </button>

    <button
      (click)="deposit()"
      class="
          bg-black text-white
          px-8 py-3
          rounded-lg
          text-lg
          hover:bg-gray-400
          transition-all duration-200
        "
    >
      Deposit
    </button>

    <button
      (click)="withdraw()"
      class="
          bg-black text-white
          px-8 py-3
          rounded-lg
          text-lg
          hover:bg-gray-400
          transition-all duration-200
        "
    >
      Withdraw
    </button>

  </div>

  <div class="relative top-50">
    <button
      (click)="confirmCancel()"
      class="
      bg-red-600 text-white
      px-4 py-2
      rounded-lg
      text-lg
      hover:bg-red-900
      transition-all duration-200
    "
    >
      Leave
    </button>
  </div>

</div>
