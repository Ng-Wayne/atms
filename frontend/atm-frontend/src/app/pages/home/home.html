<div class="min-h-screen bg-gray-100 flex flex-col items-center justify-center gap-8">

  <h1 class="text-5xl font-bold mb-12">
    Please Select A Transaction
  </h1>

  <div class="flex gap-8">

    <button
      (click)="balanceInquiry()"
      class="
          bg-black text-white
          px-8 py-3
          rounded-lg
          text-lg
          hover:bg-gray-400
          transition-all duration-200
        "
    >
      Balance Inquiry
    </button>

    <button
      class="
          bg-black text-white
          px-8 py-3
          rounded-lg
          text-lg
          hover:bg-gray-400
          transition-all duration-200
        "
    >
      Deposit
    </button>

    <button
      class="
          bg-black text-white
          px-8 py-3
          rounded-lg
          text-lg
          hover:bg-gray-400
          transition-all duration-200
        "
    >
      Withdraw
    </button>

  </div>

</div>
